<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kobo Send</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Georgia, serif;
      background: #fff;
      color: #111;
      padding: 30px 20px;
      text-align: center;
    }
    h1 {
      font-size: 28px;
      margin-bottom: 6px;
    }
    .sub {
      font-size: 16px;
      color: #666;
      margin-bottom: 30px;
    }
    .code-input {
      font-family: monospace;
      font-size: 32px;
      font-weight: bold;
      text-align: center;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 16px;
      width: 260px;
      border: 3px solid #333;
      border-radius: 8px;
      background: #f9f9f9;
      display: block;
      margin: 0 auto 20px auto;
    }
    .code-input:focus {
      border-color: #000;
      outline: none;
      background: #fff;
    }
    .btn {
      display: block;
      width: 260px;
      margin: 0 auto;
      padding: 18px;
      font-family: Georgia, serif;
      font-size: 22px;
      font-weight: bold;
      background: #222;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    .btn:active {
      background: #444;
    }
    .status {
      margin-top: 20px;
      font-size: 18px;
      color: #666;
      min-height: 28px;
    }
    .error { color: #c00; }
    .success { color: #060; }
  </style>
</head>
<body>

  <h1>KoboSend</h1>
  <p class="sub">Enter code to download</p>

  <input
    type="text"
    class="code-input"
    id="code"
    maxlength="6"
    autocomplete="off"
    placeholder="ABC123"
  >

  <button class="btn" id="dlbtn" onclick="doDownload()">
    Download
  </button>

  <p class="status" id="status"></p>

  <script>
    function getCodeFromUrl() {
      var s = window.location.search || '';
      if (s.length < 2) return '';
      var parts = s.substring(1).split('&');
      var i, pair;
      for (i = 0; i < parts.length; i++) {
        pair = parts[i].split('=');
        if (pair[0] === 'code' && pair[1]) {
          return pair[1].toUpperCase();
        }
      }
      return '';
    }

    var codeEl = document.getElementById('code');
    var statusEl = document.getElementById('status');
    var btnEl = document.getElementById('dlbtn');

    var urlCode = getCodeFromUrl();
    if (urlCode) {
      codeEl.value = urlCode;
    }

    function doDownload() {
      var code = codeEl.value;
      code = code.replace(/[^A-Za-z0-9]/g, '');
      code = code.toUpperCase();
      codeEl.value = code;

      if (code.length !== 6) {
        statusEl.innerHTML = 'Enter a 6-character code';
        statusEl.className = 'status error';
        return;
      }

      statusEl.innerHTML = 'Connecting...';
      statusEl.className = 'status';
      btnEl.disabled = true;

      var xhr = new XMLHttpRequest();
      xhr.open('GET', '/status/' + code, true);
      xhr.onreadystatechange = function() {
        if (xhr.readyState !== 4) return;

        if (xhr.status === 200) {
          var data;
          try {
            data = JSON.parse(xhr.responseText);
          } catch(e) {
            statusEl.innerHTML = 'Error. Try again.';
            statusEl.className = 'status error';
            btnEl.disabled = false;
            return;
          }

          if (data.status === 'expired') {
            statusEl.innerHTML = 'Code expired or invalid';
            statusEl.className = 'status error';
            btnEl.disabled = false;
            return;
          }

          statusEl.innerHTML = 'Downloading...';
          statusEl.className = 'status success';
          window.location.href = '/download/' + code;

          setTimeout(function() {
            statusEl.innerHTML = 'Download started!';
            btnEl.disabled = false;
          }, 3000);

        } else {
          statusEl.innerHTML = 'Connection error';
          statusEl.className = 'status error';
          btnEl.disabled = false;
        }
      };
      xhr.onerror = function() {
        statusEl.innerHTML = 'Connection failed';
        statusEl.className = 'status error';
        btnEl.disabled = false;
      };
      xhr.send(null);
    }

    if (urlCode && urlCode.length === 6) {
      setTimeout(function() { doDownload(); }, 800);
    }
  </script>

</body>
</html>
